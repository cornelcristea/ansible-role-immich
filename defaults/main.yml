---
# defaults file for immich

# path for persisting data
immich_data_volume: "{{ immich_host_volume }}/data"

# version of docker image
immich_version: release

# postgreSQL version with pgvector extension
immich_postgres_version: 15-vectorchord0.5.3-pgvector0.8.1

# valkey (redis-compatible) version
immich_valkey_version: "9"

# web interface port
immich_port: 2283

# timezone for application
immich_timezone: UTC

# database name
immich_db_name: immich_db

# database username
immich_db_username: dbuser

# database password
immich_db_password: dbpass
